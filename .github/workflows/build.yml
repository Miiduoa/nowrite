name: Build Desktop (macOS + Windows)

# 推到 main 或在 Actions 頁手動觸發時，於雲端同時建出 macOS(.dmg) 與 Windows(.exe) 安裝檔
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (arm64 dmg)
            ebuild: "--mac dmg"
            artifact_path: desktop/release/*.dmg
            artifact_name: handwrite-macos-dmg
          - os: windows-latest
            label: Windows (nsis exe)
            ebuild: "--win nsis"
            artifact_path: desktop/release/*.exe
            artifact_name: handwrite-windows-setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ---- 1) 前端（桌面模式：相對路徑 + hash 路由）----
      - name: Build frontend
        working-directory: frontend
        env:
          VUE_APP_TARGET: desktop
        run: |
          npm ci
          npm run build

      # ---- 2) 後端（PyInstaller 打包成單一執行檔）----
      - name: Build backend (PyInstaller)
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r desktop/backend/requirements-desktop.txt
          pyinstaller --clean -y --distpath desktop/dist-backend --workpath desktop/.pybuild desktop/backend/handwrite-backend.spec

      # ---- 3) Electron 封裝（mac dmg / win nsis）----
      - name: Build desktop app
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm install
          npx electron-builder ${{ matrix.ebuild }} --publish never

      # ---- 4) 上傳安裝檔 ----
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
